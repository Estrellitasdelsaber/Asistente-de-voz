<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente de Voz Pro</title>
<style>
body{font-family:Arial;text-align:center;padding-top:80px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;min-height:100vh;margin:0}
h1{font-size:28px;margin-bottom:10px}
p{font-size:16px;opacity:0.9}
#btn{background:white;border:none;padding:50px;border-radius:50%;font-size:60px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,0.3);transition:0.2s}
#btn:active{transform:scale(0.95)}
#salida{margin-top:40px;font-size:26px;font-weight:bold;background:rgba(255,255,255,0.2);padding:20px;border-radius:15px;min-height:60px}
</style>
</head>
<body>
<h1>Asistente de Voz Pro 🎤</h1>
<p>Di: "cuánto es 15 más 8" o "20 entre 4"</p>
<button id="btn">🎤</button>
<p id="salida">Toca el mic y habla</p>

<script>
const btn = document.getElementById('btn');
const salida = document.getElementById('salida');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

// Función para que hable
function hablar(texto){
  speechSynthesis.cancel(); // corta si estaba hablando
  const voz = new SpeechSynthesisUtterance(texto);
  voz.lang = 'es-ES';
  voz.rate = 0.9;
  voz.pitch = 1;
  speechSynthesis.speak(voz);
}

if(!SpeechRecognition){
  salida.textContent = 'Usa Google Chrome';
} else {
  const recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = false;

  btn.onclick = () => {
    salida.textContent = 'Escuchando...';
    recognition.start();
  };

  recognition.onresult = (e) => {
    let texto = e.results[0][0].transcript.toLowerCase();

    // Saca todos los números
    let nums = texto.match(/\d+/g);

    if(nums && nums.length >= 2){
      let n1 = parseFloat(nums[0]);
      let n2 = parseFloat(nums[1]);
      let res = 0;
      let operacion = '';
      let respuesta = '';

      // Todas las operaciones en un solo bloque
      if(texto.includes('más') || texto.includes('suma') || texto.includes('+')){
        res = n1 + n2;
        operacion = 'más';
        respuesta = n1 + ' más ' + n2 + ' es igual a ' + res;
      }
      else if(texto.includes('menos') || texto.includes('resta') || texto.includes('-')){
        res = n1 - n2;
        operacion = 'menos';
        respuesta = n1 + ' menos ' + n2 + ' es igual a ' + res;
      }
      else if(texto.includes('por') || texto.includes('multiplica') || texto.includes('x')){
        res = n1 * n2;
        operacion = 'por';
        respuesta = n1 + ' por ' + n2 + ' es igual a ' + res;
      }
      else if(texto.includes('entre') || texto.includes('divide') || texto.includes('/')){
        if(n2 === 0){
          respuesta = 'No se puede dividir entre cero';
        } else {
          res = n1 / n2;
          operacion = 'entre';
          respuesta = n1 + ' entre ' + n2 + ' es igual a ' + res;
        }
      }
      else {
        respuesta = 'Di la operación: más, menos, por o entre';
      }

      salida.textContent = respuesta;
      hablar(respuesta);

    } else {
      let msg = 'No entendí los números. Di ejemplo: 9 más 5';
      salida.textContent = msg;
      hablar(msg);
    }
  };

  recognition.onerror = () => {
    let msg = 'No te escuché, intenta otra vez';
    salida.textContent = msg;
    hablar(msg);
  };
}
</script>
</body>
  </html>
